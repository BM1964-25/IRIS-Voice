<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #080f1e;
  --navy2: #0e1a30;
  --gold: #c9a84c;
  --gold2: #e8d080;
  --goldd: rgba(201,168,76,0.25);
  --cream: #f0ebe0;
  --dim: rgba(240,235,224,0.38);
  --ok: #3ecf7a;
  --red: #e05555;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--navy);
  color: var(--cream);
  display: flex; align-items: center; justify-content: center;
}

/* ── Animated background ── */
.bg {
  position: fixed; inset: 0; pointer-events: none; overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.12;
  animation: drift 18s ease-in-out infinite alternate;
}
.bg-orb.a { width:600px; height:600px; background:var(--gold); top:-20%; left:-15%; animation-duration:20s; }
.bg-orb.b { width:400px; height:400px; background:#1a3a6e; bottom:-10%; right:-10%; animation-duration:15s; animation-delay:-7s; }
.bg-orb.c { width:300px; height:300px; background:var(--gold); top:50%; left:50%; animation-duration:12s; animation-delay:-3s; opacity:0.06; }
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.08); }
}

/* ══════════════════════════
   SETUP SCREEN
══════════════════════════ */
#screen-setup {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1.6rem; padding: 2rem;
  background: rgba(8,15,30,0.97);
  backdrop-filter: blur(20px);
}
.setup-iris-logo {
  font-weight: 800; font-size: 3.5rem; letter-spacing: 0.3em;
  color: var(--gold);
  text-shadow: 0 0 60px rgba(201,168,76,0.4), 0 0 120px rgba(201,168,76,0.15);
  animation: logo-breathe 3s ease-in-out infinite;
}
@keyframes logo-breathe {
  0%,100% { text-shadow: 0 0 40px rgba(201,168,76,0.3), 0 0 80px rgba(201,168,76,0.1); }
  50% { text-shadow: 0 0 70px rgba(201,168,76,0.6), 0 0 130px rgba(201,168,76,0.25); }
}
.setup-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 1.1rem;
  color: var(--dim); letter-spacing: 0.05em;
}
.setup-box {
  display: flex; flex-direction: column; gap: 0.8rem;
  width: 100%; max-width: 380px;
}
.setup-label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }
.setup-inp {
  background: rgba(255,255,255,0.06); border: 1px solid var(--goldd);
  border-radius: 10px; padding: 0.9rem 1.1rem; color: var(--cream);
  font-family: 'Syne', sans-serif; font-size: 0.9rem; outline: none; width: 100%;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.setup-inp:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
.setup-inp::placeholder { color: var(--dim); }
.setup-btn {
  background: linear-gradient(135deg, var(--gold), #a07830);
  color: var(--navy); border: none; border-radius: 10px;
  padding: 0.95rem; font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.9rem; letter-spacing: 0.12em; cursor: pointer;
  transition: all 0.2s; width: 100%;
  box-shadow: 0 4px 24px rgba(201,168,76,0.25);
}
.setup-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.35); }
.setup-btn:active { transform: translateY(0); }
.setup-err { font-size: 0.72rem; color: var(--red); min-height: 1em; text-align: center; }
.setup-note { font-size: 0.68rem; color: var(--dim); text-align: center; max-width: 320px; line-height: 1.7; }

/* ══════════════════════════
   MAIN INTERFACE
══════════════════════════ */
#screen-main {
  display: none;
  position: fixed; inset: 0;
  flex-direction: column; align-items: center; justify-content: space-between;
  padding: 2rem 1.5rem 1.5rem;
}

/* Top bar */
.topbar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  max-width: 640px;
}
.topbar-logo { font-weight: 800; font-size: 1.3rem; letter-spacing: 0.22em; color: var(--gold); }
.topbar-status {
  display: flex; align-items: center; gap: 0.45rem;
  font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim);
}
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px var(--ok); }
.topbar-actions { display: flex; gap: 0.4rem; }
.tbtn {
  background: transparent; border: 1px solid var(--goldd); color: var(--dim);
  border-radius: 6px; padding: 0.3rem 0.65rem; font-size: 0.62rem;
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s;
}
.tbtn:hover { border-color: var(--gold); color: var(--gold); }

/* Center — Orb */
.orb-section {
  display: flex; flex-direction: column; align-items: center; gap: 1.4rem;
  flex: 1; justify-content: center;
}

/* IRIS text above orb */
.iris-state {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 1.15rem;
  color: var(--dim); letter-spacing: 0.06em;
  min-height: 1.6rem; text-align: center;
  transition: color 0.4s;
}
.iris-state.active { color: var(--gold); }
.iris-state.speak { color: var(--ok); }

/* The Orb */
.orb-container { position: relative; cursor: pointer; }
.orb-main {
  width: 200px; height: 200px; border-radius: 50%;
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 35% 30%,
    rgba(201,168,76,0.18) 0%,
    rgba(14,26,48,0.98) 45%,
    var(--navy) 100%);
  border: 1.5px solid rgba(201,168,76,0.2);
  transition: transform 0.25s, border-color 0.4s;
  user-select: none;
}
.orb-inner-text {
  font-weight: 800; font-size: 1.8rem; letter-spacing: 0.25em;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,168,76,0.5);
  transition: opacity 0.3s;
}

/* Rings */
.orb-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.1);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.orb-ring-1 { width: 240px; height: 240px; }
.orb-ring-2 { width: 285px; height: 285px; border-color: rgba(201,168,76,0.06); }
.orb-ring-3 { width: 340px; height: 340px; border-color: rgba(201,168,76,0.03); }

/* Orb states */
@keyframes orb-idle {
  0%,100% {
    box-shadow: 0 0 30px rgba(201,168,76,0.08), 0 0 80px rgba(201,168,76,0.04), inset 0 0 40px rgba(0,0,0,0.5);
  }
  50% {
    box-shadow: 0 0 55px rgba(201,168,76,0.16), 0 0 120px rgba(201,168,76,0.07), inset 0 0 40px rgba(0,0,0,0.5);
  }
}
@keyframes orb-listen {
  0%,100% {
    box-shadow: 0 0 50px rgba(201,168,76,0.6), 0 0 100px rgba(201,168,76,0.25), 0 0 180px rgba(201,168,76,0.1);
    border-color: rgba(201,168,76,0.7);
  }
  50% {
    box-shadow: 0 0 80px rgba(201,168,76,0.9), 0 0 160px rgba(201,168,76,0.4), 0 0 260px rgba(201,168,76,0.15);
    border-color: var(--gold2);
  }
}
@keyframes orb-think {
  0%,100% { box-shadow: 0 0 40px rgba(201,168,76,0.3), inset 0 0 40px rgba(0,0,0,0.4); border-color: rgba(201,168,76,0.4); }
  50% { box-shadow: 0 0 70px rgba(201,168,76,0.55), inset 0 0 40px rgba(0,0,0,0.4); border-color: var(--gold); }
}
@keyframes orb-speak {
  0%,100% { box-shadow: 0 0 50px rgba(62,207,122,0.5), 0 0 100px rgba(62,207,122,0.18); border-color: rgba(62,207,122,0.6); }
  50% { box-shadow: 0 0 80px rgba(62,207,122,0.75), 0 0 160px rgba(62,207,122,0.3); border-color: var(--ok); }
}
@keyframes ring-pulse {
  0% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
  100% { transform: translate(-50%,-50%) scale(1.35); opacity: 0; }
}

.orb-main.idle { animation: orb-idle 4s ease-in-out infinite; }
.orb-main.listening { animation: orb-listen 0.8s ease-in-out infinite; transform: scale(1.06); }
.orb-main.thinking { animation: orb-think 1.1s ease-in-out infinite; }
.orb-main.speaking { animation: orb-speak 0.55s ease-in-out infinite; transform: scale(1.04); }
.orb-main.listening + .orb-ring-1 { animation: ring-pulse 1.1s ease-out infinite; }
.orb-main.listening + .orb-ring-1 + .orb-ring-2 { animation: ring-pulse 1.1s ease-out 0.35s infinite; }

/* Wave visualizer inside orb */
.orb-wave {
  position: absolute; bottom: 42px;
  display: flex; align-items: flex-end; gap: 3px;
  opacity: 0; transition: opacity 0.3s;
}
.orb-wave.show { opacity: 1; }
.orb-wave span {
  display: block; width: 3px; border-radius: 2px; background: var(--gold);
  height: 4px; transition: height 0.08s;
}
.orb-wave.on span { animation: ow 0.6s ease-in-out infinite; }
.orb-wave.on span:nth-child(2){animation-delay:.08s}
.orb-wave.on span:nth-child(3){animation-delay:.16s}
.orb-wave.on span:nth-child(4){animation-delay:.24s}
.orb-wave.on span:nth-child(5){animation-delay:.12s}
.orb-wave.on span:nth-child(6){animation-delay:.2s}
.orb-wave.on span:nth-child(7){animation-delay:.04s}
@keyframes ow { 0%,100%{height:4px} 50%{height:20px} }

/* Orb hint below */
.orb-hint {
  font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--dim); transition: color 0.3s; text-align: center;
}
.orb-hint.gold { color: var(--gold); }
.orb-hint.green { color: var(--ok); }

/* Hold button */
.hold-area {
  display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
}
.hold-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(201,168,76,0.1);
  border: 2px solid rgba(201,168,76,0.3);
  color: var(--gold); font-size: 1.6rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.hold-btn:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }
.hold-btn.recording { background: var(--gold); color: var(--navy); border-color: var(--gold2); transform: scale(1.1); box-shadow: 0 0 30px rgba(201,168,76,0.4); }
.hold-label { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); }

/* Transcript bubble */
.transcript-bubble {
  background: rgba(14,26,48,0.85);
  border: 1px solid var(--goldd);
  border-radius: 14px; padding: 0.8rem 1.2rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; line-height: 1.55; color: var(--cream);
  max-width: 480px; width: 100%; text-align: center;
  min-height: 3rem; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
.transcript-bubble .placeholder { color: var(--dim); font-style: italic; }

/* Dots */
.dots-wrap span {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); margin: 0 2.5px;
  animation: db 1.1s ease-in-out infinite;
}
.dots-wrap span:nth-child(2){animation-delay:.18s}.dots-wrap span:nth-child(3){animation-delay:.36s}
@keyframes db{0%,100%{transform:translateY(0);opacity:.25}50%{transform:translateY(-6px);opacity:1}}

/* Agent pills */
.agent-pills {
  display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  max-width: 500px;
}
.agent-pill {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 20px; padding: 0.3rem 0.8rem;
  font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--dim); cursor: pointer; transition: all 0.2s;
}
.agent-pill:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
.agent-pill.on { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.12); }

/* Error */
.main-err { font-size: 0.7rem; color: var(--red); min-height: 1em; text-align: center; }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb a"></div>
  <div class="bg-orb b"></div>
  <div class="bg-orb c"></div>
</div>

<!-- ══ SETUP ══ -->
<div id="screen-setup">
  <div class="setup-iris-logo">IRIS</div>
  <div class="setup-tagline">Intelligent Real Estate Intelligence System</div>

  <div class="setup-box">
    <div class="setup-label">OpenAI API-Key</div>
    <input class="setup-inp" type="password" id="oai-key"
      placeholder="sk-proj-… oder sk-…" autocomplete="off"
      onkeydown="if(event.key==='Enter')connect()">
    <button class="setup-btn" onclick="connect()">IRIS STARTEN</button>
    <div class="setup-err" id="setup-err"></div>
  </div>
  <p class="setup-note">
    Mikrofon benötigt HTTPS oder localhost.<br>
    Texteingabe funktioniert immer.
  </p>
</div>

<!-- ══ MAIN ══ -->
<div id="screen-main">

  <!-- Top -->
  <div class="topbar">
    <div class="topbar-logo">IRIS</div>
    <div class="topbar-status">
      <div class="sdot"></div>
      <span id="agent-label">Gespräch</span>
    </div>
    <div class="topbar-actions">
      <button class="tbtn" onclick="clearSession()">Neu</button>
      <button class="tbtn" onclick="disconnect()">✕</button>
    </div>
  </div>

  <!-- Orb section -->
  <div class="orb-section">

    <div class="iris-state" id="iris-state">Bereit</div>

    <div class="orb-container" onclick="toggleMic()">
      <div class="orb-main idle" id="orb">
        <div class="orb-wave" id="orb-wave">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <span class="orb-inner-text" id="orb-txt">IRIS</span>
      </div>
      <div class="orb-ring orb-ring-1"></div>
      <div class="orb-ring orb-ring-2"></div>
      <div class="orb-ring orb-ring-3"></div>
    </div>

    <div class="orb-hint" id="orb-hint">Klicken zum Sprechen</div>

    <!-- Transcript / response bubble -->
    <div class="transcript-bubble" id="bubble">
      <span class="placeholder">Was möchten Sie wissen?</span>
    </div>

    <!-- Agent pills -->
    <div class="agent-pills">
      <div class="agent-pill on" id="pill-chat" onclick="setAgent('chat')">💬 Gespräch</div>
      <div class="agent-pill" id="pill-write" onclick="setAgent('write')">✍️ Schreiben</div>
      <div class="agent-pill" id="pill-risk" onclick="setAgent('risk')">⚠️ Risiko</div>
      <div class="agent-pill" id="pill-research" onclick="setAgent('research')">🔍 Recherche</div>
      <div class="agent-pill" id="pill-claim" onclick="setAgent('claim')">⚖️ Claim</div>
      <div class="agent-pill" id="pill-kpi" onclick="setAgent('kpi')">📊 KPI</div>
    </div>

  </div>

  <div class="main-err" id="main-err"></div>

</div>

<script>
// ════════════════════════════
//  CONFIG
// ════════════════════════════
let OAI_KEY = '';
let agent = 'chat';
let history = [];
let currentAudio = null;
let mediaRec = null;
let audioChunks = [];
let isRecording = false;

const AGENTS = {
  chat: {
    name: 'Gespräch',
    sys: `Du bist IRIS — Intelligent Real Estate Intelligence System.
KI-Sprachassistentin von Metzger Real Estate Advisory & BuiltSmart AI.
Führe natürliche, professionelle Gespräche über Bau und Immobilien.
Antworte prägnant, maximal 80 Wörter. Perfekt für Sprachausgabe optimiert.
Sprich Bernhard mit "Sie" an. Antworte immer auf Deutsch.`
  },
  write: {
    name: 'Schreib-Agent',
    sys: `Du bist IRIS, Schreib-Agent für Bau- und Immobilienwirtschaft.
Erstelle: Managementberichte, Briefe, Exposés, Protokolle, Angebote.
Frage bei Bedarf nach Details. Max 100 Wörter für Sprachausgabe. Deutsch.`
  },
  risk: {
    name: 'Risiko-Agent',
    sys: `Du bist IRIS, Risiko-Agent für Bau- und Immobilienwirtschaft.
Prüfe Verträge, identifiziere Risiken, bewerte Claims, §650f BGB, VOB.
Klar und handlungsorientiert. Max 100 Wörter. Deutsch.`
  },
  research: {
    name: 'Recherche-Agent',
    sys: `Du bist IRIS, Recherche-Agent für Bau- und Immobilienwirtschaft.
Analysiere Markt, Preise, Standorte, Trends. Faktenbasiert. Max 100 Wörter. Deutsch.`
  },
  claim: {
    name: 'Claim-Agent',
    sys: `Du bist IRIS, Claim-Agent für Bau- und Immobilienwirtschaft.
Prüfe Nachträge, VOB-Ansprüche, Bauzeitverzögerungen, Schadensersatz. Max 100 Wörter. Deutsch.`
  },
  kpi: {
    name: 'KPI-Agent',
    sys: `Du bist IRIS, KPI-Agent für Bau- und Immobilienwirtschaft.
Analysiere Kennzahlen, Controlling, Performance-Metriken. Max 100 Wörter. Deutsch.`
  }
};

// ════════════════════════════
//  SETUP
// ════════════════════════════
function connect() {
  const k = document.getElementById('oai-key').value.trim();
  if (!k) { setErr('setup-err', 'Bitte API-Key eingeben.'); return; }
  OAI_KEY = k;
  localStorage.setItem('iris_oai', k);
  startIRIS();
}

function startIRIS() {
  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-main').style.display = 'flex';
  // Auto-greet after short delay
  setTimeout(greet, 600);
}

function disconnect() {
  if (currentAudio) currentAudio.pause();
  localStorage.removeItem('iris_oai');
  location.reload();
}

// ════════════════════════════
//  GREETING
// ════════════════════════════
async function greet() {
  const txt = 'Guten Tag. Ich bin IRIS. Wie kann ich Ihnen helfen?';
  setBubble(txt);
  setState('Begrüßung', 'active');
  history.push({ role: 'assistant', content: txt });
  await speak(txt);
}

// ════════════════════════════
//  MICROPHONE
// ════════════════════════════
function toggleMic() {
  if (isRecording) { stopRecording(); return; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(stream, { mimeType: mime });
    mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.onstop = () => { stream.getTracks().forEach(t => t.stop()); sendAudio(); };
    mediaRec.start(100);
    isRecording = true;
    setOrb('listening');
    setState('Ich höre…', 'active');
    setHint('Nochmal klicken zum Senden', 'gold');
    document.getElementById('orb-wave').classList.add('show', 'on');
    setBubble('');
  } catch(e) {
    const msg = e.name === 'NotAllowedError'
      ? 'Mikrofon-Zugriff verweigert. Bitte in Chrome erlauben.'
      : 'Fehler: ' + e.message;
    setErr('main-err', msg);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  document.getElementById('orb-wave').classList.remove('on');
  setOrb('thinking');
  setState('Verarbeite…', 'active');
  setHint('', '');
  mediaRec.stop();
}

async function sendAudio() {
  try {
    const mime = mediaRec ? mediaRec.mimeType : 'audio/webm';
    const ext = mime.includes('mp4') ? 'm4a' : 'webm';
    const blob = new Blob(audioChunks, { type: mime });
    if (blob.size < 500) { resetIdle(); return; }

    const fd = new FormData();
    fd.append('file', blob, 'audio.' + ext);
    fd.append('model', 'whisper-1');
    fd.append('language', 'de');

    const r = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + OAI_KEY },
      body: fd
    });

    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      const msg = e.error?.message || '';
      if (msg.includes('does not have access') || r.status === 404 || r.status === 400) {
        setErr('main-err', 'Spracheingabe nicht verfügbar für diesen Key. Bitte Text-Modus nutzen.');
        resetIdle(); return;
      }
      throw new Error(msg || 'STT Fehler ' + r.status);
    }

    const d = await r.json();
    const txt = (d.text || '').trim();
    if (!txt) { resetIdle(); return; }
    await processInput(txt);

  } catch(e) {
    setErr('main-err', e.message);
    resetIdle();
  }
}

// ════════════════════════════
//  CORE PIPELINE
// ════════════════════════════
async function processInput(text) {
  setBubble(text, 'user');
  history.push({ role: 'user', content: text });
  setOrb('thinking');
  setState('Denke…', 'active');
  showDots();

  try {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + OAI_KEY
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 300,
        messages: [
          { role: 'system', content: AGENTS[agent].sys },
          ...history.slice(-10)
        ]
      })
    });

    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error?.message || 'GPT Fehler ' + r.status);
    }

    const d = await r.json();
    const reply = d.choices[0].message.content.trim();
    history.push({ role: 'assistant', content: reply });
    setBubble(reply);
    await speak(reply);

  } catch(e) {
    setErr('main-err', e.message);
    resetIdle();
  }
}

// ════════════════════════════
//  TTS
// ════════════════════════════
async function speak(text) {
  setOrb('speaking');
  setState('Spricht…', 'speak');
  setHint('Klicken zum Unterbrechen', 'green');

  try {
    const r = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + OAI_KEY
      },
      body: JSON.stringify({
        model: 'tts-1', input: text, voice: 'nova', speed: 0.93
      })
    });

    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error?.message || 'TTS Fehler ' + r.status);
    }

    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;

    return new Promise(resolve => {
      audio.onended = () => { currentAudio = null; URL.revokeObjectURL(url); resetIdle(); resolve(); };
      audio.onerror = () => { currentAudio = null; resetIdle(); resolve(); };
      audio.play().catch(() => { currentAudio = null; resetIdle(); resolve(); });
    });

  } catch(e) {
    setErr('main-err', e.message);
    resetIdle();
  }
}

// ════════════════════════════
//  AGENTS
// ════════════════════════════
function setAgent(a) {
  agent = a;
  document.querySelectorAll('.agent-pill').forEach(p => p.classList.remove('on'));
  document.getElementById('pill-' + a).classList.add('on');
  document.getElementById('agent-label').textContent = AGENTS[a].name;
  history = [];
  const msg = AGENTS[a].name + ' aktiviert. Wie kann ich helfen?';
  setBubble(msg);
  speak(msg);
}

// ════════════════════════════
//  UI HELPERS
// ════════════════════════════
function setOrb(s) {
  const o = document.getElementById('orb');
  o.className = 'orb-main ' + s;
}

function setState(txt, cls) {
  const e = document.getElementById('iris-state');
  e.textContent = txt;
  e.className = 'iris-state ' + cls;
}

function setHint(txt, cls) {
  const e = document.getElementById('orb-hint');
  e.textContent = txt;
  e.className = 'orb-hint ' + cls;
}

function setBubble(txt, type) {
  const b = document.getElementById('bubble');
  if (!txt) {
    b.innerHTML = '<span class="placeholder"><div class="dots-wrap"><span></span><span></span><span></span></div></span>';
  } else if (type === 'user') {
    b.innerHTML = '<em style="color:var(--dim);font-family:\'Cormorant Garamond\',serif">' + escHtml(txt) + '</em>';
  } else {
    b.textContent = txt;
  }
}

function showDots() {
  document.getElementById('bubble').innerHTML =
    '<span class="dots-wrap"><span></span><span></span><span></span></span>';
}

function resetIdle() {
  setOrb('idle');
  setState('Bereit', '');
  setHint('Klicken zum Sprechen', '');
  document.getElementById('orb-wave').classList.remove('show', 'on');
}

function setErr(id, msg) {
  const e = document.getElementById(id);
  if (!e) return;
  e.textContent = '⚠ ' + msg;
  setTimeout(() => { if (e) e.textContent = ''; }, 9000);
}

function clearSession() {
  if (currentAudio) currentAudio.pause();
  history = [];
  resetIdle();
  setBubble('Was möchten Sie wissen?');
  setTimeout(greet, 300);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════
//  AUTO RESTORE
// ════════════════════════════
window.addEventListener('load', () => {
  const k = localStorage.getItem('iris_oai');
  if (k) { OAI_KEY = k; startIRIS(); }
});
</script>
